<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPX IV Dashboard</title>
  <link rel="stylesheet" href="/static/css/theme.css">

  <!-- Alpine.js (defer keeps it from blocking render) -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <!-- Chart.js must load before app.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <!-- Hammer.js + zoom plugin (pinch/wheel zoom + drag pan) -->
  <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
  <!-- Our JS (charts must precede app) -->
  <script src="/static/js/charts.js"></script>
  <script src="/static/js/app.js"></script>
</head>

<body x-data="dashboard" x-init="init()">

  <!-- ── Topbar ─────────────────────────────────────────────────────────── -->
  <div class="topbar">
    <div class="brand">SPX <em>IV</em></div>
    <nav class="topbar-nav">
      <a class="nav-link on" href="/">Dashboard</a>
      <a class="nav-link" href="/heatmap">Heatmap</a>
      <a class="nav-link" href="/today">Today</a>
      <a class="nav-link" href="/ai-explorer">AI Explorer</a>
      <a class="nav-link" href="/research">Research</a>
    </nav>
    <div class="topbar-div"></div>
    <div class="price-block">
      <span style="font-size:11px;color:var(--dim)">SPX</span>
      <span class="price-big" id="spx-price">—</span>
      <span class="price-chg dn" id="spx-chg"></span>
    </div>

    <!-- Key metric pills (static placeholders — wire to derived table later) -->
    <div class="topbar-pill">
      <span class="tp-lbl">VIX</span>
      <span class="tp-val y">—</span>
    </div>
    <div class="topbar-pill">
      <span class="tp-lbl">30D IV</span>
      <span class="tp-val a" id="atm-30d">—</span>
    </div>
    <div class="topbar-pill">
      <span class="tp-lbl">25Δ Skew</span>
      <span class="tp-val y" id="skew-30d">—</span>
    </div>
    <div class="topbar-pill">
      <span class="tp-lbl">VRP</span>
      <span class="tp-val p">— <span style="font-size:10px;color:var(--dim)">(soon)</span></span>
    </div>

    <div class="topbar-right" x-text="dateDisplay + ' · ' + timeDisplay + ' ET'"></div>
  </div>

  <!-- ── Global controls strip ──────────────────────────────────────────── -->
  <div class="ctrl-strip">

    <!-- Mode toggle -->
    <span class="ctrl-lbl">Mode</span>
    <div class="seg">
      <div class="seg-btn" :class="{on: mode==='daily'}"    @click="onModeChange('daily')">Daily</div>
      <div class="seg-btn" :class="{on: mode==='intraday'}" @click="onModeChange('intraday')">Intraday</div>
    </div>

    <div class="ctrl-div"></div>

    <!-- Date -->
    <span class="ctrl-lbl">Date</span>
    <div class="dd">
      <select x-model="date" @change="onDateChange()">
        <template x-for="d in dates" :key="d">
          <option :value="d" x-text="d"></option>
        </template>
      </select>
    </div>

    <!-- Time (daily mode only) -->
    <template x-if="mode === 'daily'">
      <div style="display:contents;">
        <span class="ctrl-lbl">Time</span>
        <div class="dd">
          <select x-model="time" @change="onTimeChange()">
            <template x-for="t in times" :key="t">
              <option :value="t" x-text="t"></option>
            </template>
          </select>
        </div>
      </div>
    </template>

    <div class="ctrl-div"></div>

    <!-- Y-axis metric -->
    <span class="ctrl-lbl">Metric</span>
    <div class="seg">
      <template x-for="m in ['iv','price','theta','vega','gamma']" :key="m">
        <div class="seg-btn" :class="{on: metric===m}"
             @click="onMetricChange(m)" x-text="m"></div>
      </template>
    </div>

    <div class="ctrl-div"></div>

    <!-- Lookback (daily) / Window (intraday) — same position, only one visible -->
    <template x-if="mode === 'daily'">
      <div style="display:contents;">
        <span class="ctrl-lbl">Lookback</span>
        <div class="slider-wrap">
          <input type="range" min="30" max="1825" step="30" x-model.number="lookbackDays"
                 @change="loadAllPanels()" style="width:220px;">
          <span class="slider-val" x-text="lookbackDays + 'D'"></span>
        </div>
      </div>
    </template>
    <template x-if="mode === 'intraday'">
      <div style="display:contents;">
        <span class="ctrl-lbl">Window</span>
        <div class="slider-wrap">
          <input type="range" min="1" max="90" x-model.number="intradayWindowDays"
                 @change="loadAllPanels()" style="width:220px;">
          <span class="slider-val" x-text="intradayWindowDays + 'D'"></span>
        </div>
      </div>
    </template>

    <div style="margin-left:auto;display:flex;gap:6px;">
      <div class="seg" style="margin-right:6px;">
        <div class="seg-btn" :class="{on: showTooltips}"
             @click="showTooltips=true; loadAllPanels()">Tips</div>
        <div class="seg-btn" :class="{on: !showTooltips}"
             @click="showTooltips=false; loadAllPanels()">Off</div>
      </div>
      <button class="btn" @click="loadAllPanels()">↺ Refresh</button>
    </div>
  </div>

  <!-- ── Panel grid ──────────────────────────────────────────────────────── -->
  <div class="panel-grid">
    <template x-for="panel in panels" :key="panel.id">

      <div class="panel" :class="{loading: panel.loading, expanded: panel.expanded}">

        <!-- Panel header -->
        <div class="panel-hdr">

          <!-- Type selector — blue button is the actual control (popover lives outside header) -->
          <div class="p-type-btn"
               @click="panel.typeMenuOpen = !panel.typeMenuOpen"
               @click.outside="panel.typeMenuOpen=false"
               x-text="panel.type.toUpperCase() + ' ▾'">
          </div>

          <!-- Raw / Interp toggle (skew + term only) -->
          <template x-if="panel.type === 'skew' || panel.type === 'term' || panel.type === 'historical'">
            <div class="p-seg">
              <span :class="{on: !panel.rawMode}"
                    @click="leaveRawMode(panel)">Interp</span>
              <span :class="{on: panel.rawMode}"
                    @click="toggleRawMode(panel)">Raw</span>
            </div>
          </template>

          <!-- ── SKEW controls (interpolated) ────────────────────────────── -->
          <template x-if="panel.type === 'skew' && !panel.rawMode">
            <div style="display:contents;">
              <!-- Mode -->
              <div class="p-seg">
                <span :class="{on: panel.skewMode==='by_dte'}"
                      @click="panel.skewMode='by_dte'; loadPanel(panel)">Multi-DTE</span>
                <span :class="{on: panel.skewMode==='by_date'}"
                      @click="panel.skewMode='by_date'; loadPanel(panel)">Multi-Date</span>
                <template x-if="mode==='intraday'">
                  <span :class="{on: panel.skewMode==='intraday'}"
                        @click="panel.skewMode='intraday'; loadPanel(panel)">Intraday</span>
                </template>
              </div>

              <!-- DTE picker (by_dte mode) — popover -->
              <template x-if="panel.skewMode === 'by_dte'">
                <div class="p-chip"
                     @click="panel.skewDteMenuOpen=!panel.skewDteMenuOpen"
                     @click.outside="panel.skewDteMenuOpen=false">
                  <span x-text="panel.skewDtes.length + ' DTEs ▾'"></span>
                </div>
              </template>

              <!-- DTE selector (by_date / intraday mode) -->
              <template x-if="panel.skewMode !== 'by_dte'">
                <div class="p-dd">
                  <select x-model.number="panel.skewDte" @change="loadPanel(panel)"
                          x-init="$nextTick(() => $el.value = panel.skewDte)">
                    <template x-for="d in ALL_DTES" :key="d">
                      <option :value="d" x-text="d + 'D'"></option>
                    </template>
                  </select>
                </div>
              </template>

              <!-- Multi-Date date picker (popover lives outside header) -->
              <template x-if="panel.skewMode === 'by_date'">
                <div class="p-chip" @click="panel.dateMenuOpen=!panel.dateMenuOpen"
                     @click.outside="panel.dateMenuOpen=false">
                  <span x-text="panel.skewDates.length + ' dates ▾'"></span>
                </div>
              </template>

              <!-- Intraday time-bucket toggle -->
              <template x-if="panel.skewMode === 'intraday'">
                <div class="p-seg">
                  <template x-for="b in [5,15,30,60]" :key="b">
                    <span :class="{on: panel.intradayBucket===b}"
                          @click="panel.intradayBucket=b; loadPanel(panel)"
                          x-text="b+'m'"></span>
                  </template>
                </div>
              </template>

              <!-- Band toggle (single-DTE only) -->
              <template x-if="panel.skewMode === 'by_dte' && panel.skewDtes.length === 1">
                <div class="p-chip" :class="{on: panel.showBand}"
                     @click="panel.showBand=!panel.showBand; loadPanel(panel)">
                  Band
                </div>
              </template>
            </div>
          </template>

          <!-- ── RAW SKEW controls ──────────────────────────────────────── -->
          <template x-if="panel.type === 'skew' && panel.rawMode">
            <div style="display:contents;">
              <!-- Sub-mode toggle -->
              <div class="p-seg">
                <span :class="{on: panel.rawSubMode==='multi_exp'}"
                      @click="setRawSubMode(panel, 'multi_exp')">Multi-Exp</span>
                <span :class="{on: panel.rawSubMode==='multi_date'}"
                      @click="setRawSubMode(panel, 'multi_date')">Multi-Date</span>
                <span :class="{on: panel.rawSubMode==='intraday'}"
                      @click="setRawSubMode(panel, 'intraday')">Intraday</span>
              </div>
              <!-- Multi-Exp: expiration multi-picker -->
              <template x-if="panel.rawSubMode === 'multi_exp'">
                <div class="p-chip"
                     @click="panel.rawExpMenuOpen=!panel.rawExpMenuOpen"
                     @click.outside="panel.rawExpMenuOpen=false">
                  <span x-text="panel.rawExpirations.length + ' Exp ▾'"></span>
                </div>
              </template>
              <!-- Multi-Date: single expiration dropdown + date multi-picker -->
              <template x-if="panel.rawSubMode === 'multi_date'">
                <div style="display:contents;">
                  <span style="font-size:9px;color:var(--dim);">EXP</span>
                  <div class="p-dd">
                    <select x-model="panel.rawSingleExp" @change="loadPanel(panel)"
                            x-init="$nextTick(() => $el.value = panel.rawSingleExp)">
                      <template x-for="e in filteredRawExps(panel)" :key="'rse-'+e.expiration">
                        <option :value="e.expiration"
                                x-text="e.expiration + ' (' + e.dte + 'D)'"></option>
                      </template>
                    </select>
                  </div>
                  <div class="p-chip"
                       @click="panel.rawDateMenuOpen=!panel.rawDateMenuOpen"
                       @click.outside="panel.rawDateMenuOpen=false">
                    <span x-text="panel.rawDates.length + ' Dates ▾'"></span>
                  </div>
                </div>
              </template>
              <!-- Intraday: single expiration + time bucket selector -->
              <template x-if="panel.rawSubMode === 'intraday'">
                <div style="display:contents;">
                  <span style="font-size:9px;color:var(--dim);">EXP</span>
                  <div class="p-dd">
                    <select x-model="panel.rawSingleExp" @change="loadPanel(panel)"
                            x-init="$nextTick(() => $el.value = panel.rawSingleExp)">
                      <template x-for="e in filteredRawExps(panel)" :key="'rie-'+e.expiration">
                        <option :value="e.expiration"
                                x-text="e.expiration + ' (' + e.dte + 'D)'"></option>
                      </template>
                    </select>
                  </div>
                  <div class="p-seg">
                    <template x-for="b in [5,15,30,60]" :key="'rb-'+b">
                      <span :class="{on: panel.intradayBucket===b}"
                            @click="panel.intradayBucket=b; loadPanel(panel)"
                            x-text="b+'m'"></span>
                    </template>
                  </div>
                </div>
              </template>
              <!-- Settlement -->
              <div class="p-seg">
                <span :class="{on: panel.rawSettlement==='PM'}"
                      @click="onRawSettlementChange(panel, 'PM')">PM</span>
                <span :class="{on: panel.rawSettlement==='AM'}"
                      @click="onRawSettlementChange(panel, 'AM')">AM</span>
              </div>
              <!-- X-axis -->
              <div class="p-seg">
                <span :class="{on: panel.rawXAxis==='strike'}"
                      @click="panel.rawXAxis='strike'; loadPanel(panel)">Strike</span>
                <span :class="{on: panel.rawXAxis==='moneyness'}"
                      @click="panel.rawXAxis='moneyness'; loadPanel(panel)">K/S</span>
              </div>
              <!-- Filter -->
              <div class="p-chip" :class="{on: panel.rawFilterFlags}"
                   @click="panel.rawFilterFlags=!panel.rawFilterFlags; loadPanel(panel)">
                Filter
              </div>
            </div>
          </template>

          <!-- ── TERM controls (interpolated) ────────────────────────────── -->
          <template x-if="panel.type === 'term' && !panel.rawMode">
            <div style="display:contents;">
              <div class="p-seg">
                <span :class="{on: panel.termMode==='by_delta'}"
                      @click="panel.termMode='by_delta'; loadPanel(panel)">Multi-Δ</span>
                <span :class="{on: panel.termMode==='by_date'}"
                      @click="panel.termMode='by_date'; loadPanel(panel)">Multi-Date</span>
                <template x-if="mode==='intraday'">
                  <span :class="{on: panel.termMode==='intraday'}"
                        @click="panel.termMode='intraday'; loadPanel(panel)">Intraday</span>
                </template>
              </div>

              <!-- Delta selector: chip popover (any delta from ALL_DELTAS) -->
              <template x-if="panel.termMode === 'by_delta'">
                <div class="p-chip"
                     @click="panel.termDeltaMenuOpen=!panel.termDeltaMenuOpen"
                     @click.outside="panel.termDeltaMenuOpen=false">
                  <span x-text="panel.termDeltas.length + ' Δ ▾'"></span>
                </div>
              </template>
              <template x-if="panel.termMode !== 'by_delta'">
                <div class="p-dd">
                  <select x-model.number="panel.termSingleDelta" @change="loadPanel(panel)"
                          x-init="$nextTick(() => $el.value = panel.termSingleDelta)">
                    <template x-for="d in ALL_DELTAS" :key="d">
                      <option :value="d" x-text="deltaLabel(d)"></option>
                    </template>
                  </select>
                </div>
              </template>

              <!-- Multi-Date chip (placed before DTE picker) -->
              <template x-if="panel.termMode === 'by_date'">
                <div class="p-chip" @click="panel.termDateMenuOpen=!panel.termDateMenuOpen"
                     @click.outside="panel.termDateMenuOpen=false">
                  <span x-text="panel.termDates.length + ' dates ▾'"></span>
                </div>
              </template>

              <!-- DTE picker — popover -->
              <div class="p-chip"
                   @click="panel.termDteMenuOpen=!panel.termDteMenuOpen"
                   @click.outside="panel.termDteMenuOpen=false">
                <span x-text="panel.termDtes.length + ' DTEs ▾'"></span>
              </div>

              <!-- Intraday time-bucket toggle -->
              <template x-if="panel.termMode === 'intraday'">
                <div class="p-seg">
                  <template x-for="b in [5,15,30,60]" :key="'tb-'+b">
                    <span :class="{on: panel.intradayBucket===b}"
                          @click="panel.intradayBucket=b; loadPanel(panel)"
                          x-text="b+'m'"></span>
                  </template>
                </div>
              </template>

              <!-- Band toggle (single-delta only) -->
              <template x-if="panel.termMode === 'by_delta' && panel.termDeltas.length === 1">
                <div class="p-chip" :class="{on: panel.showTermBand}"
                     @click="panel.showTermBand=!panel.showTermBand; loadPanel(panel)">
                  Band
                </div>
              </template>
            </div>
          </template>

          <!-- ── RAW TERM controls ──────────────────────────────────────── -->
          <template x-if="panel.type === 'term' && panel.rawMode">
            <div style="display:contents;">
              <!-- Sub-mode toggle -->
              <div class="p-seg">
                <span :class="{on: panel.rawSubMode==='multi_strike'}"
                      @click="setRawSubMode(panel, 'multi_strike')">Multi-K</span>
                <span :class="{on: panel.rawSubMode==='multi_date'}"
                      @click="setRawSubMode(panel, 'multi_date')">Multi-Date</span>
                <span :class="{on: panel.rawSubMode==='intraday'}"
                      @click="setRawSubMode(panel, 'intraday')">Intraday</span>
              </div>
              <!-- Strike text input (always visible) -->
              <span style="font-size:9px;color:var(--dim);">COMMA SEP</span>
              <div class="p-dd" style="min-width:120px;">
                <input type="text" x-model="panel.rawStrikeInput"
                       @keydown.enter="parseRawStrikes(panel); loadPanel(panel)"
                       @blur="parseRawStrikes(panel); loadPanel(panel)"
                       placeholder="e.g. 6300,6350"
                       title="Comma-separated strikes"
                       style="background:transparent;border:none;color:var(--muted);font-size:10px;outline:none;width:110px;">
              </div>
              <div class="p-chip" @click="setStrikeOffsets(panel, [0])">ATM</div>
              <!-- Multi-Date: date multi-picker -->
              <template x-if="panel.rawSubMode === 'multi_date'">
                <div class="p-chip"
                     @click="panel.rawDateMenuOpen=!panel.rawDateMenuOpen"
                     @click.outside="panel.rawDateMenuOpen=false">
                  <span x-text="panel.rawDates.length + ' Dates ▾'"></span>
                </div>
              </template>
              <!-- Intraday: time bucket selector -->
              <template x-if="panel.rawSubMode === 'intraday'">
                <div class="p-seg">
                  <template x-for="b in [5,15,30,60]" :key="'rtb-'+b">
                    <span :class="{on: panel.intradayBucket===b}"
                          @click="panel.intradayBucket=b; loadPanel(panel)"
                          x-text="b+'m'"></span>
                  </template>
                </div>
              </template>
              <!-- Settlement -->
              <div class="p-seg">
                <span :class="{on: panel.rawSettlement==='PM'}"
                      @click="onRawSettlementChange(panel, 'PM')">PM</span>
                <span :class="{on: panel.rawSettlement==='AM'}"
                      @click="onRawSettlementChange(panel, 'AM')">AM</span>
              </div>
              <!-- Filter -->
              <div class="p-chip" :class="{on: panel.rawFilterFlags}"
                   @click="panel.rawFilterFlags=!panel.rawFilterFlags; loadPanel(panel)">
                Filter
              </div>
            </div>
          </template>

          <!-- ── HISTORICAL controls (interpolated) ─────────────────────── -->
          <template x-if="panel.type === 'historical' && !panel.rawMode">
            <div style="display:contents;">
              <!-- Mode toggle: Multi-Δ vs Multi-DTE -->
              <div class="p-seg">
                <span :class="{on: panel.histMode==='by_delta'}"
                      @click="panel.histMode='by_delta'; loadPanel(panel)">Multi-Δ</span>
                <span :class="{on: panel.histMode==='by_dte'}"
                      @click="panel.histMode='by_dte'; loadPanel(panel)">Multi-DTE</span>
              </div>

              <!-- by_delta: single DTE dropdown + multi-delta popover -->
              <template x-if="panel.histMode === 'by_delta'">
                <div style="display:contents;">
                  <div class="p-dd">
                    <select x-model.number="panel.histDte" @change="loadPanel(panel)"
                            x-init="$nextTick(() => $el.value = panel.histDte)">
                      <template x-for="d in ALL_DTES" :key="'hd-'+d">
                        <option :value="d" x-text="d + 'D'"></option>
                      </template>
                    </select>
                  </div>
                  <div class="p-chip"
                       @click="panel.histDeltaMenuOpen=!panel.histDeltaMenuOpen"
                       @click.outside="panel.histDeltaMenuOpen=false">
                    <span x-text="panel.histDeltas.length + ' Δ ▾'"></span>
                  </div>
                </div>
              </template>

              <!-- by_dte: single delta dropdown + multi-dte popover -->
              <template x-if="panel.histMode === 'by_dte'">
                <div style="display:contents;">
                  <div class="p-dd">
                    <select x-model.number="panel.histDelta" @change="loadPanel(panel)"
                            x-init="$nextTick(() => $el.value = panel.histDelta)">
                      <template x-for="d in ALL_DELTAS" :key="'hdl-'+d">
                        <option :value="d" x-text="deltaLabel(d)"></option>
                      </template>
                    </select>
                  </div>
                  <div class="p-chip"
                       @click="panel.histDteMenuOpen=!panel.histDteMenuOpen"
                       @click.outside="panel.histDteMenuOpen=false">
                    <span x-text="panel.histDtes.length + ' DTEs ▾'"></span>
                  </div>
                </div>
              </template>

            </div>
          </template>

          <!-- ── RAW HISTORICAL controls ────────────────────────────────── -->
          <template x-if="panel.type === 'historical' && panel.rawMode">
            <div style="display:contents;">
              <!-- Sub-mode toggle -->
              <div class="p-seg">
                <span :class="{on: panel.rawSubMode==='multi_strike'}"
                      @click="setRawSubMode(panel, 'multi_strike')">Multi-K</span>
                <span :class="{on: panel.rawSubMode==='multi_exp'}"
                      @click="setRawSubMode(panel, 'multi_exp')">Multi-Exp</span>
              </div>
              <!-- Multi-K: single expiration dropdown -->
              <template x-if="panel.rawSubMode === 'multi_strike'">
                <div style="display:contents;">
                  <span style="font-size:9px;color:var(--dim);">EXP</span>
                  <div class="p-dd">
                    <select x-model="panel.rawSingleExp" @change="loadPanel(panel)"
                            x-init="$nextTick(() => $el.value = panel.rawSingleExp)">
                      <template x-for="e in filteredRawExps(panel)" :key="'rhe-'+e.expiration">
                        <option :value="e.expiration"
                                x-text="e.expiration + ' (' + e.dte + 'D)'"></option>
                      </template>
                    </select>
                  </div>
                </div>
              </template>
              <!-- Multi-Exp: expiration multi-picker -->
              <template x-if="panel.rawSubMode === 'multi_exp'">
                <div class="p-chip"
                     @click="panel.rawExpMenuOpen=!panel.rawExpMenuOpen"
                     @click.outside="panel.rawExpMenuOpen=false">
                  <span x-text="panel.rawExpirations.length + ' Exp ▾'"></span>
                </div>
              </template>
              <!-- Strike input (always shown) -->
              <span style="font-size:9px;color:var(--dim);">COMMA SEP</span>
              <div class="p-dd" style="min-width:120px;">
                <input type="text" x-model="panel.rawStrikeInput"
                       @keydown.enter="parseRawStrikes(panel); loadPanel(panel)"
                       @blur="parseRawStrikes(panel); loadPanel(panel)"
                       placeholder="e.g. 6300,6350"
                       title="Comma-separated strikes"
                       style="background:transparent;border:none;color:var(--muted);font-size:10px;outline:none;width:110px;">
              </div>
              <div class="p-chip" @click="setStrikeOffsets(panel, [0])">ATM</div>
              <!-- Settlement -->
              <div class="p-seg">
                <span :class="{on: panel.rawSettlement==='PM'}"
                      @click="onRawSettlementChange(panel, 'PM')">PM</span>
                <span :class="{on: panel.rawSettlement==='AM'}"
                      @click="onRawSettlementChange(panel, 'AM')">AM</span>
              </div>
              <!-- Filter flags -->
              <div class="p-chip" :class="{on: panel.rawFilterFlags}"
                   @click="panel.rawFilterFlags=!panel.rawFilterFlags; loadPanel(panel)">
                Filter
              </div>
            </div>
          </template>

          <!-- ── CONVEXITY controls ───────────────────────────────────── -->
          <template x-if="panel.type === 'convexity'">
            <div style="display:contents;">
              <!-- DTE multi-pick -->
              <div class="p-chip"
                   @click="panel.convexDteMenuOpen=!panel.convexDteMenuOpen"
                   @click.outside="panel.convexDteMenuOpen=false">
                <span x-text="panel.convexDtes.length + ' DTEs ▾'"></span>
              </div>
              <!-- Three delta dropdowns: left / center / right -->
              <span style="font-size:9px;color:var(--dim);">L</span>
              <div class="p-dd">
                <select x-model.number="panel.convexLeft" @change="loadPanel(panel)"
                        x-init="$nextTick(() => $el.value = panel.convexLeft)">
                  <template x-for="d in ALL_DELTAS" :key="'cl-'+d">
                    <option :value="d" x-text="deltaLabel(d)"></option>
                  </template>
                </select>
              </div>
              <span style="font-size:9px;color:var(--dim);">C</span>
              <div class="p-dd">
                <select x-model.number="panel.convexCenter" @change="loadPanel(panel)"
                        x-init="$nextTick(() => $el.value = panel.convexCenter)">
                  <template x-for="d in ALL_DELTAS" :key="'cc-'+d">
                    <option :value="d" x-text="deltaLabel(d)"></option>
                  </template>
                </select>
              </div>
              <span style="font-size:9px;color:var(--dim);">R</span>
              <div class="p-dd">
                <select x-model.number="panel.convexRight" @change="loadPanel(panel)"
                        x-init="$nextTick(() => $el.value = panel.convexRight)">
                  <template x-for="d in ALL_DELTAS" :key="'cr-'+d">
                    <option :value="d" x-text="deltaLabel(d)"></option>
                  </template>
                </select>
              </div>
            </div>
          </template>

          <!-- ── SKEW SLOPE controls ──────────────────────────────────── -->
          <template x-if="panel.type === 'skew_slope'">
            <div style="display:contents;">
              <div class="p-chip"
                   @click="panel.ssDteMenuOpen=!panel.ssDteMenuOpen"
                   @click.outside="panel.ssDteMenuOpen=false">
                <span x-text="panel.ssDtes.length + ' DTEs ▾'"></span>
              </div>
              <span style="font-size:9px;color:var(--dim);">A</span>
              <div class="p-dd">
                <select x-model.number="panel.ssDeltaA" @change="loadPanel(panel)"
                        x-init="$nextTick(() => $el.value = panel.ssDeltaA)">
                  <template x-for="d in ALL_DELTAS" :key="'ssa-'+d">
                    <option :value="d" x-text="deltaLabel(d)"></option>
                  </template>
                </select>
              </div>
              <span style="font-size:9px;color:var(--dim);">B</span>
              <div class="p-dd">
                <select x-model.number="panel.ssDeltaB" @change="loadPanel(panel)"
                        x-init="$nextTick(() => $el.value = panel.ssDeltaB)">
                  <template x-for="d in ALL_DELTAS" :key="'ssb-'+d">
                    <option :value="d" x-text="deltaLabel(d)"></option>
                  </template>
                </select>
              </div>
            </div>
          </template>

          <!-- ── TERM SLOPE controls ──────────────────────────────────── -->
          <template x-if="panel.type === 'term_slope'">
            <div style="display:contents;">
              <div class="p-chip"
                   @click="panel.tsDeltaMenuOpen=!panel.tsDeltaMenuOpen"
                   @click.outside="panel.tsDeltaMenuOpen=false">
                <span x-text="panel.tsDeltas.length + ' Δ ▾'"></span>
              </div>
              <span style="font-size:9px;color:var(--dim);">A</span>
              <div class="p-dd">
                <select x-model.number="panel.tsDteA" @change="loadPanel(panel)"
                        x-init="$nextTick(() => $el.value = panel.tsDteA)">
                  <template x-for="d in ALL_DTES" :key="'tsa-'+d">
                    <option :value="d" x-text="d + 'D'"></option>
                  </template>
                </select>
              </div>
              <span style="font-size:9px;color:var(--dim);">B</span>
              <div class="p-dd">
                <select x-model.number="panel.tsDteB" @change="loadPanel(panel)"
                        x-init="$nextTick(() => $el.value = panel.tsDteB)">
                  <template x-for="d in ALL_DTES" :key="'tsb-'+d">
                    <option :value="d" x-text="d + 'D'"></option>
                  </template>
                </select>
              </div>
            </div>
          </template>

          <!-- Panel actions -->
          <div class="p-actions">
            <button class="icon-btn" @click="resetPanelZoom(panel)" title="Reset zoom">⟲</button>
            <button class="icon-btn" @click="loadPanel(panel)" title="Refresh">↺</button>
            <button class="icon-btn" @click="toggleExpand(panel)" :title="panel.expanded ? 'Collapse' : 'Expand'" x-text="panel.expanded ? '⤡' : '⤢'"></button>
          </div>
        </div>

        <!-- Raw expiration picker popover (filtered by settlement) -->
        <div class="p-date-menu" x-show="panel.rawExpMenuOpen" x-cloak @click.stop>
          <div class="p-date-menu-hdr">Select Expirations</div>
          <template x-for="e in filteredRawExps(panel)" :key="'rexp-'+e.expiration">
            <label class="p-date-item">
              <input type="checkbox"
                     :checked="panel.rawExpirations.includes(e.expiration)"
                     @change="toggleRawExpiration(panel, e.expiration)">
              <span x-text="e.expiration + ' (' + e.dte + 'D)'"></span>
            </label>
          </template>
        </div>

        <!-- Raw date picker popover (multi-date modes) -->
        <div class="p-date-menu" x-show="panel.rawDateMenuOpen" x-cloak @click.stop>
          <div class="p-date-menu-hdr">Select Dates</div>
          <template x-for="d in dates" :key="'rdate-'+d">
            <label class="p-date-item">
              <input type="checkbox"
                     :checked="panel.rawDates.includes(d)"
                     @change="toggleRawDate(panel, d)">
              <span x-text="d"></span>
            </label>
          </template>
        </div>

        <!-- Convexity DTE picker popover -->
        <div class="p-date-menu" x-show="panel.convexDteMenuOpen" x-cloak @click.stop>
          <div class="p-date-menu-hdr">Select DTEs</div>
          <template x-for="d in ALL_DTES" :key="'cxd-'+d">
            <label class="p-date-item">
              <input type="checkbox" :checked="panel.convexDtes.includes(d)"
                     @change="toggleConvexDte(panel, d)">
              <span x-text="d + 'D'"></span>
            </label>
          </template>
        </div>

        <!-- Skew slope DTE picker popover -->
        <div class="p-date-menu" x-show="panel.ssDteMenuOpen" x-cloak @click.stop>
          <div class="p-date-menu-hdr">Select DTEs</div>
          <template x-for="d in ALL_DTES" :key="'ssd-'+d">
            <label class="p-date-item">
              <input type="checkbox" :checked="panel.ssDtes.includes(d)"
                     @change="toggleSsDte(panel, d)">
              <span x-text="d + 'D'"></span>
            </label>
          </template>
        </div>

        <!-- Term slope delta picker popover -->
        <div class="p-date-menu" x-show="panel.tsDeltaMenuOpen" x-cloak @click.stop>
          <div class="p-date-menu-hdr">Select deltas</div>
          <template x-for="d in ALL_DELTAS" :key="'tsdm-'+d">
            <label class="p-date-item">
              <input type="checkbox" :checked="panel.tsDeltas.includes(d)"
                     @change="toggleTsDelta(panel, d)">
              <span x-text="deltaLabel(d)"></span>
            </label>
          </template>
        </div>

        <!-- Historical delta picker popover -->
        <div class="p-date-menu" x-show="panel.histDeltaMenuOpen" x-cloak @click.stop>
          <div class="p-date-menu-hdr">Select deltas</div>
          <template x-for="d in ALL_DELTAS" :key="'hdm-'+d">
            <label class="p-date-item">
              <input type="checkbox"
                     :checked="panel.histDeltas.includes(d)"
                     @change="toggleHistDelta(panel, d)">
              <span x-text="deltaLabel(d)"></span>
            </label>
          </template>
        </div>

        <!-- Historical DTE picker popover -->
        <div class="p-date-menu" x-show="panel.histDteMenuOpen" x-cloak @click.stop>
          <div class="p-date-menu-hdr">Select DTEs</div>
          <template x-for="d in ALL_DTES" :key="'hdtm-'+d">
            <label class="p-date-item">
              <input type="checkbox"
                     :checked="panel.histDtes.includes(d)"
                     @change="toggleHistDte(panel, d)">
              <span x-text="d + 'D'"></span>
            </label>
          </template>
        </div>

        <!-- Skew DTE picker popover -->
        <div class="p-date-menu" x-show="panel.skewDteMenuOpen" x-cloak @click.stop>
          <div class="p-date-menu-hdr">
            <a href="#" @click.prevent="toggleAllSkewDtes(panel)" style="color:var(--accent);text-decoration:none;">All / None</a>
          </div>
          <template x-for="d in ALL_DTES" :key="'sdte-'+d">
            <label class="p-date-item">
              <input type="checkbox"
                     :checked="panel.skewDtes.includes(d)"
                     @change="toggleSkewDte(panel, d)">
              <span x-text="d + 'D'"></span>
            </label>
          </template>
        </div>

        <!-- Term DTE picker popover -->
        <div class="p-date-menu" x-show="panel.termDteMenuOpen" x-cloak @click.stop>
          <div class="p-date-menu-hdr">
            <a href="#" @click.prevent="toggleAllTermDtes(panel)" style="color:var(--accent);text-decoration:none;">All / None</a>
          </div>
          <template x-for="d in ALL_DTES" :key="'tdte-'+d">
            <label class="p-date-item">
              <input type="checkbox"
                     :checked="panel.termDtes.includes(d)"
                     @change="toggleTermDte(panel, d)">
              <span x-text="d + 'D'"></span>
            </label>
          </template>
        </div>

        <!-- Term delta picker popover -->
        <div class="p-date-menu" x-show="panel.termDeltaMenuOpen" x-cloak @click.stop>
          <div class="p-date-menu-hdr">Select deltas</div>
          <template x-for="d in ALL_DELTAS" :key="'tdm-'+d">
            <label class="p-date-item">
              <input type="checkbox"
                     :checked="panel.termDeltas.includes(d)"
                     @change="toggleTermDelta(panel, d)">
              <span x-text="deltaLabel(d)"></span>
            </label>
          </template>
        </div>

        <!-- Term date picker popover -->
        <div class="p-date-menu" x-show="panel.termDateMenuOpen" x-cloak @click.stop>
          <div class="p-date-menu-hdr">Select dates</div>
          <template x-for="d in dates" :key="'tdate-'+d">
            <label class="p-date-item">
              <input type="checkbox"
                     :checked="panel.termDates.includes(d)"
                     @change="toggleTermDate(panel, d)">
              <span x-text="d"></span>
            </label>
          </template>
        </div>

        <!-- Skew date picker popover (sibling of header to avoid clipping) -->
        <div class="p-date-menu" x-show="panel.dateMenuOpen" x-cloak @click.stop>
          <div class="p-date-menu-hdr">Select dates</div>
          <template x-for="d in dates" :key="d">
            <label class="p-date-item">
              <input type="checkbox"
                     :checked="panel.skewDates.includes(d)"
                     @change="toggleSkewDate(panel, d)">
              <span x-text="d"></span>
            </label>
          </template>
        </div>

        <!-- Type popover (sibling of header so it isn't clipped by header overflow) -->
        <div class="p-type-menu" x-show="panel.typeMenuOpen" x-cloak>
          <template x-for="t in ['skew','term','historical','skew_slope','term_slope','convexity']" :key="t">
            <div class="p-type-menu-item"
                 :class="{on: panel.type===t}"
                 @click="setPanelType(panel, t); panel.typeMenuOpen=false"
                 x-text="t.replace('_',' ').toUpperCase()">
            </div>
          </template>
        </div>

        <!-- Legend (click items to toggle series visibility) -->
        <div class="panel-legend" x-show="panel.legend.length">
          <template x-for="(item, i) in panel.legend" :key="item.label">
            <div class="leg" :class="{off: item.hidden}"
                 @click="toggleLegendItem(panel, i)">
              <template x-if="item.band">
                <div class="leg-band"></div>
              </template>
              <template x-if="!item.band">
                <div class="leg-line" :style="`background:${item.color}`"></div>
              </template>
              <span x-text="item.label"></span>
            </div>
          </template>
        </div>

        <!-- Chart body -->
        <div class="panel-body">
          <!-- Loading overlay -->
          <div class="spinner" x-show="panel.loading">
            <div class="spinner-dot"></div>
            <span>Loading…</span>
          </div>
          <!-- Error overlay -->
          <div class="panel-error" x-show="panel.error && !panel.loading"
               x-text="panel.error">
          </div>
          <canvas :id="`canvas-${panel.id}`"></canvas>
        </div>

        <!-- Stats footer -->
        <template x-if="panel.stats">
          <div class="panel-stats">
            <template x-if="panel.type === 'term' && panel.stats">
              <div style="display:contents;">
                <div class="ps">
                  <div class="ps-lbl">Slope</div>
                  <div class="ps-val" :class="panel.stats.slope > 0 ? 'g' : 'r'"
                       x-text="(panel.stats.slope > 0 ? '+' : '') + (panel.stats.slope * 100).toFixed(1) + '%'">
                  </div>
                </div>
                <div class="ps">
                  <div class="ps-lbl">Structure</div>
                  <div class="ps-val" :class="panel.stats.structure === 'Contango' ? 'g' : 'y'"
                       x-text="panel.stats.structure">
                  </div>
                </div>
                <div class="ps">
                  <div class="ps-lbl" x-text="panel.stats.short_dte + 'D ATM'"></div>
                  <div class="ps-val a" x-text="panel.stats.short_iv !== undefined ? (panel.stats.short_iv * 100).toFixed(1) + '%' : '—'"></div>
                </div>
                <div class="ps">
                  <div class="ps-lbl" x-text="panel.stats.long_dte + 'D ATM'"></div>
                  <div class="ps-val a" x-text="panel.stats.long_iv !== undefined ? (panel.stats.long_iv * 100).toFixed(1) + '%' : '—'"></div>
                </div>
              </div>
            </template>
          </div>
        </template>

      </div><!-- /.panel -->
    </template>
  </div><!-- /.panel-grid -->

</body>
</html>

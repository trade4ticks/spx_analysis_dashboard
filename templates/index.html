<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPX IV Dashboard</title>
  <link rel="stylesheet" href="/static/css/theme.css">

  <!-- Alpine.js (defer keeps it from blocking render) -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <!-- Chart.js must load before app.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <!-- Hammer.js + zoom plugin (pinch/wheel zoom + drag pan) -->
  <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
  <!-- Our JS (charts must precede app) -->
  <script src="/static/js/charts.js"></script>
  <script src="/static/js/app.js"></script>
</head>

<body x-data="dashboard" x-init="init()">

  <!-- ── Topbar ─────────────────────────────────────────────────────────── -->
  <div class="topbar">
    <div class="brand">SPX <em>IV</em></div>
    <div class="topbar-div"></div>
    <div class="price-block">
      <span style="font-size:11px;color:var(--dim)">SPX</span>
      <span class="price-big" id="spx-price">—</span>
      <span class="price-chg dn" id="spx-chg"></span>
    </div>

    <!-- Key metric pills (static placeholders — wire to derived table later) -->
    <div class="topbar-pill">
      <span class="tp-lbl">VIX</span>
      <span class="tp-val y">—</span>
    </div>
    <div class="topbar-pill">
      <span class="tp-lbl">30D IV</span>
      <span class="tp-val a" id="atm-30d">—</span>
    </div>
    <div class="topbar-pill">
      <span class="tp-lbl">25Δ Skew</span>
      <span class="tp-val y" id="skew-30d">—</span>
    </div>
    <div class="topbar-pill">
      <span class="tp-lbl">VRP</span>
      <span class="tp-val p">— <span style="font-size:10px;color:var(--dim)">(soon)</span></span>
    </div>

    <div class="topbar-right" x-text="dateDisplay + ' · ' + timeDisplay + ' ET'"></div>
  </div>

  <!-- ── Global controls strip ──────────────────────────────────────────── -->
  <div class="ctrl-strip">

    <!-- Mode toggle -->
    <span class="ctrl-lbl">Mode</span>
    <div class="seg">
      <div class="seg-btn" :class="{on: mode==='daily'}"    @click="onModeChange('daily')">Daily</div>
      <div class="seg-btn" :class="{on: mode==='intraday'}" @click="onModeChange('intraday')">Intraday</div>
    </div>

    <div class="ctrl-div"></div>

    <!-- Date -->
    <span class="ctrl-lbl">Date</span>
    <div class="dd">
      <select x-model="date" @change="onDateChange()">
        <template x-for="d in dates" :key="d">
          <option :value="d" x-text="d"></option>
        </template>
      </select>
    </div>

    <!-- Time (daily mode only) -->
    <template x-if="mode === 'daily'">
      <div style="display:contents;">
        <span class="ctrl-lbl">Time</span>
        <div class="dd">
          <select x-model="time" @change="onTimeChange()">
            <template x-for="t in times" :key="t">
              <option :value="t" x-text="t"></option>
            </template>
          </select>
        </div>
      </div>
    </template>

    <!-- Intraday window slider -->
    <template x-if="mode === 'intraday'">
      <div style="display:contents;">
        <span class="ctrl-lbl">Window</span>
        <div class="slider-wrap">
          <input type="range" min="1" max="90" x-model.number="intradayWindowDays"
                 @change="loadAllPanels()" style="width:90px;">
          <span class="slider-val" x-text="intradayWindowDays + 'D'"></span>
        </div>
      </div>
    </template>

    <div class="ctrl-div"></div>

    <!-- Y-axis metric -->
    <span class="ctrl-lbl">Metric</span>
    <div class="seg">
      <template x-for="m in ['iv','price','theta','vega','gamma']" :key="m">
        <div class="seg-btn" :class="{on: metric===m}"
             @click="onMetricChange(m)" x-text="m"></div>
      </template>
    </div>

    <div class="ctrl-div"></div>

    <!-- Lookback (daily mode) -->
    <template x-if="mode === 'daily'">
      <div style="display:contents;">
        <span class="ctrl-lbl">Lookback</span>
        <div class="slider-wrap">
          <input type="range" min="30" max="730" step="30" x-model.number="lookbackDays"
                 @change="loadAllPanels()" style="width:90px;">
          <span class="slider-val" x-text="lookbackDays + 'D'"></span>
        </div>
      </div>
    </template>

    <div style="margin-left:auto;display:flex;gap:6px;">
      <button class="btn" @click="loadAllPanels()">↺ Refresh</button>
    </div>
  </div>

  <!-- ── Panel grid ──────────────────────────────────────────────────────── -->
  <div class="panel-grid">
    <template x-for="panel in panels" :key="panel.id">

      <div class="panel" :class="{loading: panel.loading, expanded: panel.expanded}">

        <!-- Panel header -->
        <div class="panel-hdr">

          <!-- Type selector — blue button is the actual control (popover lives outside header) -->
          <div class="p-type-btn"
               @click="panel.typeMenuOpen = !panel.typeMenuOpen"
               @click.outside="panel.typeMenuOpen=false"
               x-text="panel.type.toUpperCase() + ' ▾'">
          </div>

          <!-- ── SKEW controls ────────────────────────────────────────── -->
          <template x-if="panel.type === 'skew'">
            <div style="display:contents;">
              <!-- Mode -->
              <div class="p-seg">
                <span :class="{on: panel.skewMode==='by_dte'}"
                      @click="panel.skewMode='by_dte'; loadPanel(panel)">Multi-DTE</span>
                <span :class="{on: panel.skewMode==='by_date'}"
                      @click="panel.skewMode='by_date'; loadPanel(panel)">Multi-Date</span>
                <template x-if="mode==='intraday'">
                  <span :class="{on: panel.skewMode==='intraday'}"
                        @click="panel.skewMode='intraday'; loadPanel(panel)">Intraday</span>
                </template>
              </div>

              <!-- DTE picker (by_dte mode) — popover -->
              <template x-if="panel.skewMode === 'by_dte'">
                <div class="p-chip"
                     @click="panel.skewDteMenuOpen=!panel.skewDteMenuOpen"
                     @click.outside="panel.skewDteMenuOpen=false">
                  <span x-text="panel.skewDtes.length + ' DTEs ▾'"></span>
                </div>
              </template>

              <!-- DTE selector (by_date / intraday mode) -->
              <template x-if="panel.skewMode !== 'by_dte'">
                <div class="p-dd">
                  <select x-model.number="panel.skewDte" @change="loadPanel(panel)">
                    <template x-for="d in ALL_DTES" :key="d">
                      <option :value="d" x-text="d + 'D'"></option>
                    </template>
                  </select>
                </div>
              </template>

              <!-- Multi-Date date picker (popover lives outside header) -->
              <template x-if="panel.skewMode === 'by_date'">
                <div class="p-chip" @click="panel.dateMenuOpen=!panel.dateMenuOpen"
                     @click.outside="panel.dateMenuOpen=false">
                  <span x-text="panel.skewDates.length + ' dates ▾'"></span>
                </div>
              </template>

              <!-- Intraday time-bucket toggle -->
              <template x-if="panel.skewMode === 'intraday'">
                <div class="p-seg">
                  <template x-for="b in [5,15,30,60]" :key="b">
                    <span :class="{on: panel.intradayBucket===b}"
                          @click="panel.intradayBucket=b; loadPanel(panel)"
                          x-text="b+'m'"></span>
                  </template>
                </div>
              </template>

              <!-- Band toggle (single-DTE only) -->
              <template x-if="panel.skewMode === 'by_dte' && panel.skewDtes.length === 1">
                <div class="p-chip" :class="{on: panel.showBand}"
                     @click="panel.showBand=!panel.showBand; loadPanel(panel)">
                  Band
                </div>
              </template>
            </div>
          </template>

          <!-- ── TERM controls ────────────────────────────────────────── -->
          <template x-if="panel.type === 'term'">
            <div style="display:contents;">
              <div class="p-seg">
                <span :class="{on: panel.termMode==='by_delta'}"
                      @click="panel.termMode='by_delta'; loadPanel(panel)">Multi-Δ</span>
                <span :class="{on: panel.termMode==='by_date'}"
                      @click="panel.termMode='by_date'; loadPanel(panel)">Multi-Date</span>
                <template x-if="mode==='intraday'">
                  <span :class="{on: panel.termMode==='intraday'}"
                        @click="panel.termMode='intraday'; loadPanel(panel)">Intraday</span>
                </template>
              </div>

              <!-- Delta selector: chip popover (any delta from ALL_DELTAS) -->
              <template x-if="panel.termMode === 'by_delta'">
                <div class="p-chip"
                     @click="panel.termDeltaMenuOpen=!panel.termDeltaMenuOpen"
                     @click.outside="panel.termDeltaMenuOpen=false">
                  <span x-text="panel.termDeltas.length + ' Δ ▾'"></span>
                </div>
              </template>
              <template x-if="panel.termMode !== 'by_delta'">
                <div class="p-dd">
                  <select x-model.number="panel.termDeltas[0]" @change="loadPanel(panel)">
                    <template x-for="d in ALL_DELTAS" :key="d">
                      <option :value="d" x-text="deltaLabel(d)"></option>
                    </template>
                  </select>
                </div>
              </template>

              <!-- Multi-Date chip (placed before DTE picker) -->
              <template x-if="panel.termMode === 'by_date'">
                <div class="p-chip" @click="panel.termDateMenuOpen=!panel.termDateMenuOpen"
                     @click.outside="panel.termDateMenuOpen=false">
                  <span x-text="panel.termDates.length + ' dates ▾'"></span>
                </div>
              </template>

              <!-- DTE picker — popover -->
              <div class="p-chip"
                   @click="panel.termDteMenuOpen=!panel.termDteMenuOpen"
                   @click.outside="panel.termDteMenuOpen=false">
                <span x-text="panel.termDtes.length + ' DTEs ▾'"></span>
              </div>

              <!-- Intraday time-bucket toggle -->
              <template x-if="panel.termMode === 'intraday'">
                <div class="p-seg">
                  <template x-for="b in [5,15,30,60]" :key="'tb-'+b">
                    <span :class="{on: panel.intradayBucket===b}"
                          @click="panel.intradayBucket=b; loadPanel(panel)"
                          x-text="b+'m'"></span>
                  </template>
                </div>
              </template>

              <!-- Band toggle (single-delta only) -->
              <template x-if="panel.termMode === 'by_delta' && panel.termDeltas.length === 1">
                <div class="p-chip" :class="{on: panel.showTermBand}"
                     @click="panel.showTermBand=!panel.showTermBand; loadPanel(panel)">
                  Band
                </div>
              </template>
            </div>
          </template>

          <!-- ── HISTORICAL controls ──────────────────────────────────── -->
          <template x-if="panel.type === 'historical'">
            <div style="display:contents;">
              <!-- Mode toggle: Multi-Δ vs Multi-DTE -->
              <div class="p-seg">
                <span :class="{on: panel.histMode==='by_delta'}"
                      @click="panel.histMode='by_delta'; loadPanel(panel)">Multi-Δ</span>
                <span :class="{on: panel.histMode==='by_dte'}"
                      @click="panel.histMode='by_dte'; loadPanel(panel)">Multi-DTE</span>
              </div>

              <!-- by_delta: single DTE dropdown + multi-delta popover -->
              <template x-if="panel.histMode === 'by_delta'">
                <div style="display:contents;">
                  <div class="p-dd">
                    <select x-model.number="panel.histDte" @change="loadPanel(panel)">
                      <template x-for="d in ALL_DTES" :key="'hd-'+d">
                        <option :value="d" x-text="d + 'D'"></option>
                      </template>
                    </select>
                  </div>
                  <div class="p-chip"
                       @click="panel.histDeltaMenuOpen=!panel.histDeltaMenuOpen"
                       @click.outside="panel.histDeltaMenuOpen=false">
                    <span x-text="panel.histDeltas.length + ' Δ ▾'"></span>
                  </div>
                </div>
              </template>

              <!-- by_dte: single delta dropdown + multi-dte popover -->
              <template x-if="panel.histMode === 'by_dte'">
                <div style="display:contents;">
                  <div class="p-dd">
                    <select x-model.number="panel.histDelta" @change="loadPanel(panel)">
                      <template x-for="d in ALL_DELTAS" :key="'hdl-'+d">
                        <option :value="d" x-text="deltaLabel(d)"></option>
                      </template>
                    </select>
                  </div>
                  <div class="p-chip"
                       @click="panel.histDteMenuOpen=!panel.histDteMenuOpen"
                       @click.outside="panel.histDteMenuOpen=false">
                    <span x-text="panel.histDtes.length + ' DTEs ▾'"></span>
                  </div>
                </div>
              </template>

              <!-- Lookback -->
              <div class="slider-wrap" style="margin-left:4px;">
                <span style="font-size:9px;color:var(--dim);white-space:nowrap;">Back</span>
                <input type="range" min="30" max="1825" step="30"
                       x-model.number="panel.histLookback"
                       @change="loadPanel(panel)" style="width:60px;">
                <span class="slider-val" x-text="panel.histLookback + 'D'" style="font-size:10px;min-width:36px;"></span>
              </div>
            </div>
          </template>

          <!-- ── CONCAVITY controls ───────────────────────────────────── -->
          <template x-if="panel.type === 'concavity'">
            <div style="display:contents;">
              <!-- DTE -->
              <div class="p-dd">
                <select x-model.number="panel.concavDte" @change="loadPanel(panel)">
                  <template x-for="d in COMMON_DTES" :key="d">
                    <option :value="d" x-text="d + 'D'"></option>
                  </template>
                </select>
              </div>

              <!-- Wing deltas -->
              <span style="font-size:9px;color:var(--dim);white-space:nowrap;">Wings:</span>
              <div class="p-seg">
                <template x-for="d in [10,20,25,35]" :key="d">
                  <span :class="{on: panel.concavLeft===d}"
                        @click="panel.concavLeft=d; loadPanel(panel)"
                        x-text="d+'Δp'"></span>
                </template>
              </div>
              <span style="font-size:9px;color:var(--dim);white-space:nowrap;">Ctr:</span>
              <div class="p-seg">
                <template x-for="d in [40,45,50]" :key="d">
                  <span :class="{on: panel.concavCenter===d}"
                        @click="panel.concavCenter=d; loadPanel(panel)"
                        x-text="d===50?'ATM':d+'Δp'"></span>
                </template>
              </div>

              <!-- Lookback -->
              <div class="slider-wrap" style="margin-left:4px;">
                <span style="font-size:9px;color:var(--dim);white-space:nowrap;">Back</span>
                <input type="range" min="30" max="1825" step="30"
                       x-model.number="panel.concavLookback"
                       @change="loadPanel(panel)" style="width:60px;">
                <span class="slider-val" x-text="panel.concavLookback + 'D'" style="font-size:10px;min-width:36px;"></span>
              </div>
            </div>
          </template>

          <!-- Panel actions -->
          <div class="p-actions">
            <button class="icon-btn" @click="resetPanelZoom(panel)" title="Reset zoom">⟲</button>
            <button class="icon-btn" @click="loadPanel(panel)" title="Refresh">↺</button>
            <button class="icon-btn" @click="toggleExpand(panel)" :title="panel.expanded ? 'Collapse' : 'Expand'" x-text="panel.expanded ? '⤡' : '⤢'"></button>
          </div>
        </div>

        <!-- Historical delta picker popover -->
        <div class="p-date-menu" x-show="panel.histDeltaMenuOpen" x-cloak>
          <div class="p-date-menu-hdr">Select deltas</div>
          <template x-for="d in ALL_DELTAS" :key="'hdm-'+d">
            <label class="p-date-item">
              <input type="checkbox"
                     :checked="panel.histDeltas.includes(d)"
                     @change="toggleHistDelta(panel, d)">
              <span x-text="deltaLabel(d)"></span>
            </label>
          </template>
        </div>

        <!-- Historical DTE picker popover -->
        <div class="p-date-menu" x-show="panel.histDteMenuOpen" x-cloak>
          <div class="p-date-menu-hdr">Select DTEs</div>
          <template x-for="d in ALL_DTES" :key="'hdtm-'+d">
            <label class="p-date-item">
              <input type="checkbox"
                     :checked="panel.histDtes.includes(d)"
                     @change="toggleHistDte(panel, d)">
              <span x-text="d + 'D'"></span>
            </label>
          </template>
        </div>

        <!-- Skew DTE picker popover -->
        <div class="p-date-menu" x-show="panel.skewDteMenuOpen" x-cloak>
          <div class="p-date-menu-hdr">
            <a href="#" @click.prevent="toggleAllSkewDtes(panel)" style="color:var(--accent);text-decoration:none;">All / None</a>
          </div>
          <template x-for="d in ALL_DTES" :key="'sdte-'+d">
            <label class="p-date-item">
              <input type="checkbox"
                     :checked="panel.skewDtes.includes(d)"
                     @change="toggleSkewDte(panel, d)">
              <span x-text="d + 'D'"></span>
            </label>
          </template>
        </div>

        <!-- Term DTE picker popover -->
        <div class="p-date-menu" x-show="panel.termDteMenuOpen" x-cloak>
          <div class="p-date-menu-hdr">
            <a href="#" @click.prevent="toggleAllTermDtes(panel)" style="color:var(--accent);text-decoration:none;">All / None</a>
          </div>
          <template x-for="d in ALL_DTES" :key="'tdte-'+d">
            <label class="p-date-item">
              <input type="checkbox"
                     :checked="panel.termDtes.includes(d)"
                     @change="toggleTermDte(panel, d)">
              <span x-text="d + 'D'"></span>
            </label>
          </template>
        </div>

        <!-- Term delta picker popover -->
        <div class="p-date-menu" x-show="panel.termDeltaMenuOpen" x-cloak>
          <div class="p-date-menu-hdr">Select deltas</div>
          <template x-for="d in ALL_DELTAS" :key="'tdm-'+d">
            <label class="p-date-item">
              <input type="checkbox"
                     :checked="panel.termDeltas.includes(d)"
                     @change="toggleTermDelta(panel, d)">
              <span x-text="deltaLabel(d)"></span>
            </label>
          </template>
        </div>

        <!-- Term date picker popover -->
        <div class="p-date-menu" x-show="panel.termDateMenuOpen" x-cloak>
          <div class="p-date-menu-hdr">Select dates</div>
          <template x-for="d in dates" :key="'tdate-'+d">
            <label class="p-date-item">
              <input type="checkbox"
                     :checked="panel.termDates.includes(d)"
                     @change="toggleTermDate(panel, d)">
              <span x-text="d"></span>
            </label>
          </template>
        </div>

        <!-- Skew date picker popover (sibling of header to avoid clipping) -->
        <div class="p-date-menu" x-show="panel.dateMenuOpen" x-cloak>
          <div class="p-date-menu-hdr">Select dates</div>
          <template x-for="d in dates" :key="d">
            <label class="p-date-item">
              <input type="checkbox"
                     :checked="panel.skewDates.includes(d)"
                     @change="toggleSkewDate(panel, d)">
              <span x-text="d"></span>
            </label>
          </template>
        </div>

        <!-- Type popover (sibling of header so it isn't clipped by header overflow) -->
        <div class="p-type-menu" x-show="panel.typeMenuOpen" x-cloak>
          <template x-for="t in ['skew','term','historical','concavity']" :key="t">
            <div class="p-type-menu-item"
                 :class="{on: panel.type===t}"
                 @click="setPanelType(panel, t); panel.typeMenuOpen=false"
                 x-text="t.toUpperCase()">
            </div>
          </template>
        </div>

        <!-- Legend (click items to toggle series visibility) -->
        <div class="panel-legend" x-show="panel.legend.length">
          <template x-for="(item, i) in panel.legend" :key="item.label">
            <div class="leg" :class="{off: item.hidden}"
                 @click="toggleLegendItem(panel, i)">
              <template x-if="item.band">
                <div class="leg-band"></div>
              </template>
              <template x-if="!item.band">
                <div class="leg-line" :style="`background:${item.color}`"></div>
              </template>
              <span x-text="item.label"></span>
            </div>
          </template>
        </div>

        <!-- Chart body -->
        <div class="panel-body">
          <!-- Loading overlay -->
          <div class="spinner" x-show="panel.loading">
            <div class="spinner-dot"></div>
            <span>Loading…</span>
          </div>
          <!-- Error overlay -->
          <div class="panel-error" x-show="panel.error && !panel.loading"
               x-text="panel.error">
          </div>
          <canvas :id="`canvas-${panel.id}`"></canvas>
        </div>

        <!-- Stats footer -->
        <template x-if="panel.stats">
          <div class="panel-stats">
            <template x-if="panel.type === 'term' && panel.stats">
              <div style="display:contents;">
                <div class="ps">
                  <div class="ps-lbl">Slope</div>
                  <div class="ps-val" :class="panel.stats.slope > 0 ? 'g' : 'r'"
                       x-text="(panel.stats.slope > 0 ? '+' : '') + (panel.stats.slope * 100).toFixed(1) + '%'">
                  </div>
                </div>
                <div class="ps">
                  <div class="ps-lbl">Structure</div>
                  <div class="ps-val" :class="panel.stats.structure === 'Contango' ? 'g' : 'y'"
                       x-text="panel.stats.structure">
                  </div>
                </div>
                <div class="ps">
                  <div class="ps-lbl" x-text="panel.stats.short_dte + 'D ATM'"></div>
                  <div class="ps-val a" x-text="panel.stats.short_iv !== undefined ? (panel.stats.short_iv * 100).toFixed(1) + '%' : '—'"></div>
                </div>
                <div class="ps">
                  <div class="ps-lbl" x-text="panel.stats.long_dte + 'D ATM'"></div>
                  <div class="ps-val a" x-text="panel.stats.long_iv !== undefined ? (panel.stats.long_iv * 100).toFixed(1) + '%' : '—'"></div>
                </div>
              </div>
            </template>
            <template x-if="panel.type === 'concavity' && panel.stats">
              <div style="display:contents;">
                <div class="ps">
                  <div class="ps-lbl">Today</div>
                  <div class="ps-val" :class="panel.stats.current >= 0 ? 'g' : 'r'"
                       x-text="panel.stats.current !== null ? panel.stats.current.toFixed(2) + 'v' : '—'">
                  </div>
                </div>
                <div class="ps">
                  <div class="ps-lbl">Mean</div>
                  <div class="ps-val a" x-text="panel.stats.mean?.toFixed(2) + 'v'"></div>
                </div>
                <div class="ps">
                  <div class="ps-lbl">Min</div>
                  <div class="ps-val r" x-text="panel.stats.minimum?.toFixed(2) + 'v'"></div>
                </div>
                <div class="ps">
                  <div class="ps-lbl">Max</div>
                  <div class="ps-val g" x-text="panel.stats.maximum?.toFixed(2) + 'v'"></div>
                </div>
              </div>
            </template>
          </div>
        </template>

      </div><!-- /.panel -->
    </template>
  </div><!-- /.panel-grid -->

</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPX IV — Research</title>
  <link rel="stylesheet" href="/static/css/theme.css">
  <style>
    /* ── Layout ──────────────────────────────────────────────────────────── */
    .research-body {
      flex: 1; display: flex; flex-direction: row; min-height: 0; overflow: hidden;
    }

    /* ── Sidebar ─────────────────────────────────────────────────────────── */
    .res-sidebar {
      width: 260px; flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid #333;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .res-sidebar-hdr {
      padding: 10px 10px 8px;
      border-bottom: 1px solid #333;
      display: flex; align-items: center; gap: 6px;
    }
    .res-sidebar-hdr span { flex: 1; color: #aaa; font-size: 11px; font-weight: 700; letter-spacing: .4px; }
    .res-run-list { flex: 1; overflow-y: auto; }
    .res-run-item {
      padding: 9px 10px;
      border-bottom: 1px solid #222;
      cursor: pointer;
      display: flex; flex-direction: column; gap: 3px;
    }
    .res-run-item:hover { background: #2a2a2a; }
    .res-run-item.active { background: #1a3a5c; border-left: 2px solid var(--accent); }
    .res-run-name { font-size: 11px; color: #ddd; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .res-run-meta { font-size: 10px; color: #666; display: flex; gap: 6px; align-items: center; }

    /* ── Badges ──────────────────────────────────────────────────────────── */
    .badge { font-size: 9px; padding: 1px 5px; border-radius: 3px; font-weight: 700; }
    .badge-green  { background: #1a4a2a; color: #2ecc71; }
    .badge-yellow { background: #4a3a10; color: #f1c40f; }
    .badge-red    { background: #4a1a1a; color: #e74c3c; }
    .badge-dim    { background: #333; color: #888; }

    /* ── Main area ───────────────────────────────────────────────────────── */
    .res-main {
      flex: 1; overflow-y: auto; padding: 16px 20px;
      display: flex; flex-direction: column; gap: 16px;
    }

    /* ── New run form ────────────────────────────────────────────────────── */
    .form-section { display: flex; flex-direction: column; gap: 12px; max-width: 720px; }
    .form-row { display: flex; flex-direction: column; gap: 4px; }
    .form-row label { font-size: 11px; color: #aaa; font-weight: 700; letter-spacing: .3px; }
    .form-row input, .form-row textarea, .form-row select {
      background: #2a2a2a; border: 1px solid #444; color: #ddd;
      padding: 6px 8px; border-radius: 4px; font-size: 12px; width: 100%;
    }
    .form-row textarea { resize: vertical; min-height: 70px; font-family: inherit; }
    .form-row input:focus, .form-row textarea:focus, .form-row select:focus {
      outline: none; border-color: var(--accent);
    }
    .form-hint { font-size: 10px; color: #666; margin-top: 2px; }
    .form-row-h { display: flex; gap: 12px; }
    .form-row-h .form-row { flex: 1; }

    .ticker-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
    .ticker-chip {
      font-size: 10px; padding: 2px 7px; border-radius: 10px;
      background: #333; color: #aaa; cursor: pointer; border: 1px solid #444;
    }
    .ticker-chip:hover { background: #1a3a5c; color: #3498db; border-color: #3498db; }

    .preset-row { display: flex; gap: 6px; flex-wrap: wrap; }
    .preset-btn {
      font-size: 10px; padding: 3px 10px; border-radius: 3px;
      background: #2a2a2a; color: #aaa; border: 1px solid #444; cursor: pointer;
    }
    .preset-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Run detail ──────────────────────────────────────────────────────── */
    .run-hdr { display: flex; align-items: baseline; gap: 10px; flex-wrap: wrap; }
    .run-title { font-size: 16px; color: #ddd; font-weight: 700; }
    .run-question { font-size: 12px; color: #888; font-style: italic; margin-top: 2px; }

    /* Progress */
    .progress-wrap { background: #1e1e1e; border: 1px solid #333; border-radius: 6px; padding: 12px 14px; }
    .progress-meta { display: flex; justify-content: space-between; font-size: 11px; color: #f1c40f; margin-bottom: 8px; }
    .progress-bar {
      background: #2a2a2a; border-radius: 4px; height: 8px; overflow: hidden;
    }
    .progress-fill {
      height: 100%; border-radius: 4px; background: var(--accent);
      transition: width 1s ease;
    }
    .progress-fill.pulse {
      animation: pulse 1.5s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{opacity:.6} 50%{opacity:1} }

    /* Summary card */
    .summary-card {
      background: #242424; border: 1px solid #484848; border-radius: 6px;
      padding: 16px 18px;
    }
    .summary-card p {
      font-size: 13px; color: #e0e0e0; line-height: 1.8; margin: 0 0 10px;
      white-space: pre-wrap;
    }
    .summary-card p:last-child { margin-bottom: 0; }
    .summary-missing {
      background: #1e1e1e; border: 1px solid #333; border-radius: 6px;
      padding: 12px 16px; color: #555; font-size: 12px; font-style: italic;
    }

    /* Results summary table */
    .res-table { border-collapse: collapse; font-size: 11px; width: 100%; }
    .res-table th {
      background: #2a2a2a; color: #aaa; font-size: 10px; font-weight: 700;
      padding: 5px 8px; text-align: left; border: 1px solid #333;
      white-space: nowrap;
    }
    .res-table td { padding: 4px 8px; border: 1px solid #222; color: #ccc; }
    .res-table tr:hover td { background: #252525; }
    .res-table td.num { text-align: right; font-variant-numeric: tabular-nums; }
    .val-pos { color: #2ecc71; }
    .val-neg { color: #e74c3c; }

    /* ── Interactive chart cards ─────────────────────────────────────────── */
    .charts-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
    }
    @media (max-width: 1300px) { .charts-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 800px)  { .charts-grid { grid-template-columns: 1fr; } }

    .chart-card {
      background: #1e1e1e; border: 1px solid #333; border-radius: 6px; overflow: hidden;
    }
    .chart-card-hdr {
      padding: 7px 10px; background: #2d2d2d; font-size: 11px; color: #aaa;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .chart-card-hdr .chart-type-badge {
      font-size: 9px; font-weight: 700; padding: 1px 5px; border-radius: 3px;
      background: #1a3a5c; color: #3498db; margin-right: 5px; vertical-align: middle;
    }
    .chart-canvas-wrap { position: relative; height: 280px; padding: 8px; }
    .chart-canvas-wrap canvas { width: 100% !important; }

    /* PNG chart cards (scatter / heatmap) */
    .chart-card img {
      width: 100%; height: auto; display: block; cursor: zoom-in;
    }
    .chart-card img:hover { opacity: 0.9; }

    /* Fullscreen button on chart card headers */
    .fs-btn {
      background: none; border: none; cursor: pointer; color: #555;
      font-size: 15px; padding: 0 2px; line-height: 1; flex-shrink: 0;
    }
    .fs-btn:hover { color: #aaa; }

    /* Section headers */
    .section-hdr {
      font-size: 11px; color: #aaa; font-weight: 700; letter-spacing: .4px;
      padding-bottom: 6px; border-bottom: 1px solid #333;
    }

    /* Empty state */
    .empty-state { text-align: center; padding: 60px 20px; color: #555; font-size: 13px; }
    .empty-state .icon { font-size: 36px; margin-bottom: 10px; }

    /* ── Lightbox ────────────────────────────────────────────────────────── */
    .lightbox-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.93); z-index: 9999;
      display: flex; align-items: center; justify-content: center;
      cursor: zoom-out;
    }
    .lightbox-overlay img {
      width: 95vw; height: 93vh;
      object-fit: contain; border-radius: 4px;
      box-shadow: 0 0 40px rgba(0,0,0,0.8);
    }
    .lightbox-close {
      position: absolute; top: 16px; right: 20px;
      font-size: 28px; color: #aaa; cursor: pointer; line-height: 1;
    }
    .lightbox-close:hover { color: #fff; }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <script src="/static/js/research.js?v=9"></script>
</head>

<body x-data="research" x-init="init()">

  <!-- ── Lightbox ──────────────────────────────────────────────────────── -->
  <div x-show="lightboxUrl" class="lightbox-overlay"
       @click.self="closeLightbox()" @keydown.window.escape="closeLightbox()">
    <span class="lightbox-close" @click="closeLightbox()">✕</span>
    <img :src="lightboxUrl" alt="Chart fullscreen">
  </div>

  <!-- ── Topbar ─────────────────────────────────────────────────────────── -->
  <div class="topbar">
    <div class="brand">SPX <em>IV</em></div>
    <nav class="topbar-nav">
      <a class="nav-link" href="/">Dashboard</a>
      <a class="nav-link" href="/heatmap">Heatmap</a>
      <a class="nav-link" href="/today">Today</a>
      <a class="nav-link" href="/ai-explorer">AI Explorer</a>
      <a class="nav-link on" href="/research">Research</a>
    </nav>
    <div class="topbar-right">Research Runner</div>
  </div>

  <!-- ── Body ──────────────────────────────────────────────────────────── -->
  <div class="research-body">

    <!-- Sidebar -->
    <div class="res-sidebar">
      <div class="res-sidebar-hdr">
        <span>RESEARCH RUNS</span>
        <button class="btn" style="padding:2px 8px;font-size:10px" @click="newRun()">+ New</button>
      </div>
      <div class="res-run-list">
        <template x-if="runs.length === 0">
          <div style="padding:16px;color:#555;font-size:11px;text-align:center">No runs yet</div>
        </template>
        <template x-for="run in runs" :key="run.id">
          <div class="res-run-item" :class="{active: selectedRun?.id === run.id}"
               @click="selectRun(run)">
            <div class="res-run-name" x-text="run.name"></div>
            <div class="res-run-meta">
              <span class="badge" :class="statusClass(run.status)" x-text="run.status"></span>
              <span x-text="fmtDate(run.created_at)"></span>
            </div>
          </div>
        </template>
      </div>
    </div>

    <!-- Main content -->
    <div class="res-main">

      <!-- ── Empty / welcome ──────────────────────────────────────────── -->
      <template x-if="view === 'list'">
        <div class="empty-state">
          <div class="icon">🔬</div>
          <div>Select a run from the sidebar or start a new one.</div>
        </div>
      </template>

      <!-- ── New run form ─────────────────────────────────────────────── -->
      <template x-if="view === 'new'">
        <div class="form-section">
          <div style="font-size:15px;color:#ddd;font-weight:700"
               x-text="retryRunId ? 'Edit &amp; Retry Run' : 'New Research Run'"></div>
          <div x-show="retryRunId"
               style="font-size:11px;color:#f1c40f;background:#2a2000;border:1px solid #5a4a00;border-radius:4px;padding:6px 10px">
            Editing failed run — results will be cleared and the run restarted.
          </div>

          <div class="form-row">
            <label>RUN NAME</label>
            <input type="text" x-model="form.name" placeholder="e.g. OI_study_Apr26">
          </div>

          <div class="form-row">
            <label>RESEARCH QUESTION</label>
            <textarea x-model="form.question"
              placeholder="Describe what you want to explore. The AI agent will decide which analyses to run.&#10;&#10;Example: Analyze whether OI-weighted metrics predict forward returns across tickers. Identify the strongest signals and check year-over-year consistency."></textarea>
          </div>

          <div class="form-row">
            <label>SOURCE TABLE</label>
            <div class="preset-row" style="margin-bottom:4px">
              <button class="preset-btn" @click="setTablePreset('daily_features')">OI / daily_features</button>
              <button class="preset-btn" @click="setTablePreset('surface_metrics_core')">SPX Surface / surface_metrics_core</button>
            </div>
            <input type="text" x-model="form.table">
          </div>

          <div class="form-row">
            <label>TICKERS <span style="color:#555;font-weight:400">(comma-separated — leave blank for surface_metrics_core)</span></label>
            <input type="text" x-model="form.tickers" placeholder="AAPL, SPY, IWM, XOM">
            <template x-if="availableTickers.length > 0">
              <div class="ticker-chips">
                <template x-for="t in availableTickers" :key="t">
                  <span class="ticker-chip" @click="addTicker(t)" x-text="t"></span>
                </template>
              </div>
            </template>
          </div>

          <div class="form-row-h">
            <div class="form-row">
              <label>FEATURE COLUMNS (X) <span style="color:#555;font-weight:400">— predictors</span></label>
              <textarea x-model="form.x_columns" style="min-height:54px"
                placeholder="oi_weighted_strike_all_div_spot, put_call_oi_ratio"></textarea>
              <template x-if="availableColumns.length > 0">
                <div class="ticker-chips" style="margin-top:4px">
                  <template x-for="col in availableColumns" :key="'x-'+col.name">
                    <span class="ticker-chip"
                          :style="isXSel(col.name) ? 'background:#1a3a5c;color:#3498db;border-color:#3498db;font-weight:700' : ''"
                          @click="toggleXCol(col.name)"
                          x-text="col.name"></span>
                  </template>
                </div>
              </template>
            </div>
            <div class="form-row">
              <label>OUTCOME COLUMNS (Y) <span style="color:#555;font-weight:400">— what to predict</span></label>
              <textarea x-model="form.y_columns" style="min-height:54px"
                placeholder="ret_1d_fwd, ret_5d_fwd, ret_20d_fwd"></textarea>
              <template x-if="availableColumns.length > 0">
                <div class="ticker-chips" style="margin-top:4px">
                  <template x-for="col in availableColumns" :key="'y-'+col.name">
                    <span class="ticker-chip"
                          :style="isYSel(col.name) ? 'background:#1a2a1a;color:#2ecc71;border-color:#2ecc71;font-weight:700' : ''"
                          @click="toggleYCol(col.name)"
                          x-text="col.name"></span>
                  </template>
                </div>
              </template>
            </div>
          </div>

          <div class="form-row-h">
            <div class="form-row">
              <label>DATE FROM</label>
              <input type="date" x-model="form.date_from">
            </div>
            <div class="form-row">
              <label>DATE TO</label>
              <input type="date" x-model="form.date_to">
            </div>
            <div class="form-row">
              <label>MODEL</label>
              <select x-model="form.model">
                <option value="claude-sonnet-4-6">Sonnet 4.6 (faster)</option>
                <option value="claude-opus-4-7">Opus 4.7 (deeper)</option>
              </select>
            </div>
            <div class="form-row">
              <label>MAX TOOL CALLS</label>
              <input type="number" x-model="form.max_tool_calls" min="10" max="200" style="width:80px">
              <div class="form-hint">~1 per analysis step</div>
            </div>
          </div>

          <div x-show="submitError" style="color:#e74c3c;font-size:12px" x-text="submitError"></div>

          <div style="display:flex;gap:8px;align-items:center">
            <button class="btn" @click="submitRun()" :disabled="submitting"
                    style="background:var(--accent);color:#fff;padding:7px 20px;font-size:12px">
              <span x-text="submitting ? 'Starting…' : retryRunId ? '↺ Retry Run' : '▶ Run Research'"></span>
            </button>
            <button class="btn" @click="retryRunId ? selectRun(selectedRun) : (view='list')" style="color:#888">Cancel</button>
          </div>
        </div>
      </template>

      <!-- ── Run detail ────────────────────────────────────────────────── -->
      <template x-if="view === 'run' && selectedRun">
        <div style="display:flex;flex-direction:column;gap:16px">

          <!-- Header -->
          <div>
            <div class="run-hdr">
              <span class="run-title" x-text="selectedRun.name"></span>
              <span class="badge" :class="statusClass(selectedRun.status)" x-text="selectedRun.status"></span>
              <span style="font-size:10px;color:#555" x-text="fmtDate(selectedRun.created_at)"></span>
              <button class="btn" style="margin-left:auto;font-size:10px;color:#888"
                      @click="exportPdf(selectedRun.id)">↓ PDF</button>
              <button class="btn" style="font-size:10px;color:#e74c3c"
                      @click="deleteRun(selectedRun.id)">✕ Delete</button>
            </div>
            <div class="run-question" x-text="selectedRun.question"></div>
          </div>

          <!-- Running progress -->
          <template x-if="selectedRun.status === 'running'">
            <div class="progress-wrap">
              <div class="progress-meta">
                <span x-text="progressLabel"></span>
                <span x-text="progressPct + '%'"></span>
              </div>
              <div class="progress-bar">
                <div class="progress-fill pulse" :style="'width:' + Math.max(4, progressPct) + '%'"></div>
              </div>
            </div>
          </template>

          <!-- Error + Edit & Retry -->
          <template x-if="selectedRun.status === 'error'">
            <div style="background:#2a1a1a;border:1px solid #5a1a1a;border-radius:6px;padding:12px 14px">
              <div style="color:#e74c3c;font-size:12px;margin-bottom:10px"
                   x-text="selectedRun.error_msg || 'Unknown error'"></div>
              <button class="btn"
                      style="background:#1a3a5c;color:#3498db;border:1px solid #1a5a8a;font-size:11px;padding:5px 14px"
                      @click="editRetry()">
                ✎ Edit Config &amp; Retry
              </button>
            </div>
          </template>

          <!-- Loading -->
          <template x-if="loading">
            <div style="color:#888;font-size:12px">Loading results…</div>
          </template>

          <!-- AI Summary — always shown for complete/error runs -->
          <template x-if="selectedRun.status === 'complete' || selectedRun.status === 'error'">
            <div>
              <div class="section-hdr" style="margin-bottom:8px">AI FINDINGS SUMMARY</div>
              <template x-if="selectedRun.ai_summary">
                <div class="summary-card">
                  <template x-for="(para, i) in selectedRun.ai_summary.split(/\n{2,}/)" :key="i">
                    <p x-show="para.trim()" x-text="para.trim()"></p>
                  </template>
                </div>
              </template>
              <template x-if="!selectedRun.ai_summary">
                <div class="summary-missing">No AI summary was generated for this run.</div>
              </template>
            </div>
          </template>

          <!-- Summary table -->
          <template x-if="summaryRows.length > 0">
            <div>
              <div class="section-hdr" style="display:flex;align-items:center;gap:10px">
                SIGNAL SCORECARD — sorted by robustness score
                <button class="csv-btn" @click="exportScorecardCsv()" title="Export to CSV">CSV</button>
              </div>
              <div style="overflow-x:auto;max-height:500px;overflow-y:auto;margin-top:8px">
                <table class="res-table">
                  <thead style="position:sticky;top:0;z-index:2">
                    <tr>
                      <th>Ticker</th><th>Feature</th><th>Outcome</th>
                      <th>Score</th><th>Pattern</th>
                      <th>Pearson r</th><th>Spearman r</th><th>Tail Spread</th>
                      <th>Consist %</th><th>Final Equity</th><th>Max DD</th><th>N</th>
                    </tr>
                  </thead>
                  <tbody>
                    <template x-for="row in summaryRows" :key="row.ticker+row.x_col+row.y_col">
                      <tr>
                        <td x-text="row.ticker || 'all'"></td>
                        <td x-text="row.x_col"></td>
                        <td x-text="row.y_col"></td>
                        <td class="num" x-text="row.composite_score != null ? row.composite_score.toFixed(0) : '—'"></td>
                        <td style="font-size:10px" x-text="row.pattern || '—'"></td>
                        <td class="num" :class="row.pearson_r > 0 ? 'val-pos' : row.pearson_r < 0 ? 'val-neg' : ''"
                            x-text="r4(row.pearson_r)"></td>
                        <td class="num" :class="row.spearman_r > 0 ? 'val-pos' : row.spearman_r < 0 ? 'val-neg' : ''"
                            x-text="r4(row.spearman_r)"></td>
                        <td class="num" :class="row.spread > 0 ? 'val-pos' : row.spread < 0 ? 'val-neg' : ''"
                            x-text="pct(row.spread)"></td>
                        <td class="num" x-text="row.consistency_pct != null ? row.consistency_pct + '%' : '—'"></td>
                        <td class="num" x-text="row.final_equity != null ? row.final_equity.toFixed(2) + 'x' : '—'"></td>
                        <td class="num val-neg" x-text="row.max_drawdown != null ? pct(row.max_drawdown) : '—'"></td>
                        <td class="num" x-text="row.n || '—'"></td>
                      </tr>
                    </template>
                  </tbody>
                </table>
              </div>
            </div>
          </template>

          <!-- ── Interactive Chart.js charts ──────────────────────────── -->
          <template x-if="deciles.length > 0">
            <div>
              <div class="section-hdr">DECILE ANALYSIS
                <span style="color:#555;font-weight:400;font-size:10px"> — hover for details</span>
              </div>
              <div class="charts-grid" style="margin-top:10px">
                <template x-for="r in deciles" :key="r.id">
                  <div class="chart-card">
                    <div class="chart-card-hdr" style="display:flex;align-items:center">
                      <span class="chart-type-badge">Decile</span>
                      <span style="flex:1;overflow:hidden;text-overflow:ellipsis"
                            x-text="(r.ticker || 'all') + ' | ' + r.x_col + ' → ' + r.y_col"></span>
                      <button class="fs-btn" @click.stop="openChartFullscreen('c-decile-' + r.id)"
                              title="Fullscreen">⛶</button>
                    </div>
                    <div class="chart-canvas-wrap">
                      <canvas :id="'c-decile-' + r.id"></canvas>
                    </div>
                    <!-- Per-decile stats table -->
                    <template x-if="r.result?.deciles?.length">
                      <div style="overflow-x:auto;padding:0 8px 8px">
                        <table class="res-table" style="font-size:10px">
                          <thead>
                            <tr><th>D</th><th>N</th><th>Avg Ret%</th><th>Median%</th><th>Win%</th><th>Std%</th></tr>
                          </thead>
                          <tbody>
                            <template x-for="d in r.result.deciles" :key="d.decile">
                              <tr>
                                <td class="num" x-text="d.decile"></td>
                                <td class="num" x-text="d.n"></td>
                                <td class="num" :class="(d.avg_ret||0)>0?'val-pos':'val-neg'"
                                    x-text="pct(d.avg_ret)"></td>
                                <td class="num" :class="(d.med_ret||0)>0?'val-pos':'val-neg'"
                                    x-text="pct(d.med_ret)"></td>
                                <td class="num" x-text="d.win_rate!=null?(d.win_rate*100).toFixed(1)+'%':'—'"></td>
                                <td class="num" x-text="d.std_dev!=null?(d.std_dev*100).toFixed(3)+'%':'—'"></td>
                              </tr>
                            </template>
                          </tbody>
                        </table>
                      </div>
                    </template>
                  </div>
                </template>
              </div>
            </div>
          </template>

          <template x-if="results.some(r => r.analysis_type === 'equity_curve_top')">
            <div>
              <div class="section-hdr">EQUITY CURVES
                <span style="color:#555;font-weight:400;font-size:10px"> — hover for date / value</span>
              </div>
              <div class="charts-grid" style="margin-top:10px">
                <template x-for="r in results.filter(x => x.analysis_type === 'equity_curve_top')" :key="r.id">
                  <div class="chart-card">
                    <div class="chart-card-hdr" style="display:flex;align-items:center">
                      <span class="chart-type-badge">Equity</span>
                      <span style="flex:1;overflow:hidden;text-overflow:ellipsis"
                            x-text="(r.ticker || 'all') + ' | ' + r.x_col + ' → ' + r.y_col"></span>
                      <button class="fs-btn" @click.stop="openChartFullscreen('c-equity-' + r.id)"
                              title="Fullscreen">⛶</button>
                    </div>
                    <div class="chart-canvas-wrap" style="height:300px">
                      <canvas :id="'c-equity-' + r.id"></canvas>
                    </div>
                    <div style="padding:4px 10px 6px;font-size:10px;color:#666;display:flex;gap:14px">
                      <span>Trades: <span style="color:#ccc" x-text="r.result?.n_trades || '—'"></span></span>
                      <span>Final: <span :class="(r.result?.final_equity||1)>=1?'val-pos':'val-neg'"
                            x-text="r.result?.final_equity ? r.result.final_equity.toFixed(3)+'x' : '—'"></span></span>
                      <span>MaxDD: <span class="val-neg"
                            x-text="r.result?.max_drawdown != null ? pct(r.result.max_drawdown) : '—'"></span></span>
                    </div>
                  </div>
                </template>
              </div>
            </div>
          </template>

          <template x-if="yearlyConsistency.length > 0">
            <div>
              <div class="section-hdr">YEARLY CONSISTENCY
                <span style="color:#555;font-weight:400;font-size:10px"> — hover for year detail</span>
              </div>
              <div class="charts-grid" style="margin-top:10px">
                <template x-for="r in yearlyConsistency" :key="r.id">
                  <div class="chart-card">
                    <div class="chart-card-hdr" style="display:flex;align-items:center">
                      <span class="chart-type-badge">Yearly</span>
                      <span style="flex:1;overflow:hidden;text-overflow:ellipsis"
                            x-text="(r.ticker || 'all') + ' | ' + r.x_col + ' → ' + r.y_col"></span>
                      <button class="fs-btn" @click.stop="openChartFullscreen('c-yearly-' + r.id)"
                              title="Fullscreen">⛶</button>
                    </div>
                    <div class="chart-canvas-wrap">
                      <canvas :id="'c-yearly-' + r.id"></canvas>
                    </div>
                    <div x-show="r.result?.consistency_pct != null"
                         style="padding:4px 10px 6px;font-size:10px;color:#666">
                      Top beats bottom:
                      <span style="color:#ccc" x-text="(r.result?.consistency_pct || 0) + '%'"></span>
                      of years
                      <span x-text="'(' + (r.result?.wins || 0) + '/' + (r.result?.total_years || 0) + ')'"></span>
                    </div>
                  </div>
                </template>
              </div>
            </div>
          </template>

          <!-- ── Static PNG charts (scatter + heatmap) ────────────────── -->
          <template x-if="staticCharts.length > 0">
            <div>
              <div class="section-hdr">SCATTER &amp; HEATMAP
                <span style="color:#555;font-weight:400;font-size:10px"> — click to fullscreen</span>
              </div>
              <div class="charts-grid" style="margin-top:10px">
                <template x-for="chart in staticCharts" :key="chart.id">
                  <div class="chart-card">
                    <div class="chart-card-hdr" style="display:flex;align-items:center">
                      <span class="chart-type-badge" x-text="chart.chart_type === 'correlation_heatmap' ? 'Heatmap' : 'Scatter'"></span>
                      <span style="flex:1;overflow:hidden;text-overflow:ellipsis"
                            x-text="chart.title || chart.chart_type"></span>
                      <button class="fs-btn" @click.stop="openLightbox(chartUrl(chart.id))"
                              title="Fullscreen">⛶</button>
                    </div>
                    <img :src="chartUrl(chart.id)" :alt="chart.title" loading="lazy"
                         @click="openLightbox(chartUrl(chart.id))">
                  </div>
                </template>
              </div>
            </div>
          </template>

          <!-- ── Follow-up dialogue ────────────────────────────────────── -->
          <template x-if="selectedRun.status === 'complete'">
            <div style="border-top:1px solid #333;padding-top:16px">
              <div class="section-hdr" style="margin-bottom:12px">FOLLOW-UP QUESTIONS</div>

              <!-- Existing follow-ups -->
              <template x-for="(fup, i) in followups" :key="fup.id || i">
                <div style="margin-bottom:14px">
                  <div style="background:#2a2a2a;border-left:3px solid #555;padding:8px 12px;border-radius:0 4px 4px 0;margin-bottom:4px">
                    <div style="font-size:10px;color:#555;margin-bottom:4px">YOUR QUESTION</div>
                    <div style="font-size:12px;color:#ddd" x-text="fup.question"></div>
                  </div>
                  <div style="background:#1a2a1a;border-left:3px solid #2ecc71;padding:10px 12px;border-radius:0 4px 4px 0">
                    <div style="font-size:10px;color:#555;margin-bottom:6px">AI RESPONSE</div>
                    <div style="font-size:12px;color:#ccc;line-height:1.7;white-space:pre-wrap" x-text="fup.answer"></div>
                  </div>
                </div>
              </template>

              <!-- New question input -->
              <div style="display:flex;flex-direction:column;gap:8px" x-show="!followupLoading">
                <textarea
                  x-model="followupQuestion"
                  style="background:#2a2a2a;border:1px solid #444;color:#ddd;padding:8px;border-radius:4px;
                         font-size:12px;resize:vertical;min-height:64px;font-family:inherit;width:100%"
                  placeholder="Ask a follow-up question — e.g. 'Why might the signal be weaker in 2022?' or 'Can you explain the D10 result for XOM?'"
                  @keydown.ctrl.enter="askFollowup()"></textarea>
                <div style="display:flex;gap:8px;align-items:center">
                  <button class="btn"
                          style="background:#1a4a2a;color:#2ecc71;border:1px solid #2ecc71;padding:5px 16px;font-size:11px"
                          @click="askFollowup()" :disabled="!followupQuestion.trim()">
                    Ask Claude
                  </button>
                  <span style="font-size:10px;color:#555">Ctrl+Enter to submit</span>
                  <span x-show="followupError" style="color:#e74c3c;font-size:11px" x-text="followupError"></span>
                </div>
              </div>

              <!-- Loading state -->
              <div x-show="followupLoading"
                   style="background:#1a2a1a;border:1px solid #2ecc71;border-radius:6px;padding:12px 14px;
                          display:flex;align-items:center;gap:10px;color:#2ecc71;font-size:12px">
                <span style="animation:pulse 1s infinite">⚙</span>
                <span>Claude is analyzing the results…</span>
              </div>

              <div id="followup-bottom"></div>
            </div>
          </template>

        </div>
      </template>

    </div><!-- /res-main -->
  </div><!-- /research-body -->

</body>
</html>

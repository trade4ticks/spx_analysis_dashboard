<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPX IV — Today</title>
  <link rel="stylesheet" href="/static/css/theme.css">
  <style>
    /* ── Page body ─────────────────────────────────────────────────────────── */
    .today-body {
      flex: 1;
      overflow: auto;
      display: flex;
      flex-direction: row;
      min-height: 0;
    }
    .today-grid-wrap {
      flex: 0 0 auto;   /* shrink to table width — no blank gap */
      overflow: visible;
      padding: 14px;
    }

    /* ── Scatter panel ──────────────────────────────────────────────────────── */
    .today-scatter-wrap {
      width: 420px;
      flex-shrink: 0;
      border-left: 1px solid #333;
      display: flex;
      flex-direction: column;
      background: #262626;
      min-height: 0;
    }
    .scatter-hdr {
      padding: 5px 8px;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      gap: 7px;
      flex-shrink: 0;
      background: #2d2d2d;
      flex-wrap: nowrap;
    }
    .scatter-body {
      flex: 1;
      padding: 8px;
      position: relative;
      min-height: 0;
    }
    .scatter-body canvas {
      position: absolute;
      inset: 8px;
      width: calc(100% - 16px) !important;
      height: calc(100% - 16px) !important;
    }

    /* ── Table ─────────────────────────────────────────────────────────────── */
    .today-table {
      border-collapse: collapse;
      font-size: 11px;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    .today-table th,
    .today-table td {
      border: 1px solid #111;
      padding: 4px 6px;
      text-align: center;
      min-width: 58px;
      height: 24px;
    }
    .today-table thead th {
      background: #2d2d2d;
      color: #aaa;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .3px;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    .today-time-hdr {
      position: sticky !important;
      left: 0;
      z-index: 3 !important;
      background: #2d2d2d !important;
      min-width: 46px;
    }
    .today-time-cell {
      position: sticky;
      left: 0;
      background: #2a2a2a;
      color: #888;
      font-size: 10px;
      font-weight: 700;
      z-index: 1;
      min-width: 46px;
    }
  </style>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <script src="/static/js/today.js"></script>
</head>

<body x-data="today" x-init="init()">

  <!-- ── Topbar ─────────────────────────────────────────────────────────── -->
  <div class="topbar">
    <div class="brand">SPX <em>IV</em></div>
    <nav class="topbar-nav">
      <a class="nav-link" href="/">Dashboard</a>
      <a class="nav-link" href="/heatmap">Heatmap</a>
      <a class="nav-link on" href="/today">Today</a>
    </nav>
    <div class="topbar-div"></div>

    <!-- SPX spot price -->
    <div class="price-block">
      <span style="font-size:11px;color:var(--dim)">SPX</span>
      <span class="price-big" x-text="latestSpotFmt"></span>
      <span class="price-chg" :class="spotChgClass" x-text="spotChgFmt"></span>
    </div>

    <!-- Intraday sparkline -->
    <div x-html="sparklineSvg" style="align-self:center;line-height:0;"></div>

    <div class="topbar-right" x-text="dateDisplay + ' · ' + selectedLabel"></div>
  </div>

  <!-- ── Controls ───────────────────────────────────────────────────────── -->
  <div class="ctrl-strip">

    <!-- Mode toggle -->
    <span class="ctrl-lbl">View</span>
    <div class="seg">
      <div class="seg-btn" :class="{on: mode==='iv'}"        @click="onModeChange('iv')">IV</div>
      <div class="seg-btn" :class="{on: mode==='change'}"    @click="onModeChange('change')">5min Chg</div>
      <div class="seg-btn" :class="{on: mode==='open_chg'}"  @click="onModeChange('open_chg')">vs Open</div>
    </div>

    <div class="ctrl-div"></div>

    <!-- Date -->
    <span class="ctrl-lbl">Date</span>
    <div class="dd">
      <select x-model="date" @change="onDateChange()">
        <template x-for="d in dates" :key="d">
          <option :value="d" x-text="d"></option>
        </template>
      </select>
    </div>

    <!-- Expiration -->
    <span class="ctrl-lbl">Expiration</span>
    <div class="dd">
      <select x-model="selectedExp" @change="onExpirationChange()">
        <template x-for="e in expirations" :key="e.expiration">
          <option :value="e.expiration" x-text="e.label"></option>
        </template>
      </select>
    </div>

    <div style="margin-left:auto;">
      <button class="btn" @click="loadGrid()">↺ Refresh</button>
    </div>
  </div>

  <!-- ── Body: grid + scatter ──────────────────────────────────────────── -->
  <div class="today-body">

    <!-- Left: IV heatmap grid -->
    <div class="today-grid-wrap">
      <div x-show="loading" class="hm-loading">Loading…</div>
      <div x-show="error && !loading" class="hm-error" x-text="error"></div>
      <div x-show="!loading && !error" id="today-container"></div>
    </div>

    <!-- Right: SPX vs VIX scatter -->
    <div class="today-scatter-wrap">
      <div class="scatter-hdr">
        <span class="ctrl-lbl" style="white-space:nowrap">SPX vs</span>
        <div class="p-seg">
          <span :class="{on: scatterY==='vix'}"   @click="setScatterY('vix')">VIX</span>
          <span :class="{on: scatterY==='vix9d'}" @click="setScatterY('vix9d')">VIX9D</span>
          <span :class="{on: scatterY==='vix3m'}" @click="setScatterY('vix3m')">VIX3M</span>
        </div>
        <div class="p-seg" style="margin-left:auto">
          <span :class="{on: scatterDays===30}" @click="setScatterDays(30)">30D</span>
          <span :class="{on: scatterDays===90}" @click="setScatterDays(90)">90D</span>
        </div>
      </div>
      <div class="scatter-body">
        <canvas id="scatter-canvas"></canvas>
      </div>
    </div>

  </div>

</body>
</html>

# ─────────────────────────────────────────────────────────────
# Research Runner Config
# Run with: python run_research.py --config research_config.yaml
# ─────────────────────────────────────────────────────────────

name: "OI_weighted_vs_returns_Apr26"

question: >
  Analyze the relationship between OI-weighted strike metrics and forward returns
  across all available tickers and return horizons. Identify which features and
  tickers show the strongest predictive signals, how consistent those signals are
  year-over-year, and whether the top-decile equity curves look tradeable.
  Report null results honestly.

# Source table and database
table: daily_features   # daily_features | option_oi_surface | surface_metrics_core

# Tickers to test (leave empty [] to test all tickers in the table)
tickers:
  - AAPL
  - SPY
  - IWM
  - XOM

# Feature columns (x-axis / predictors)
x_columns:
  - oi_weighted_strike_all_div_spot
  - oi_weighted_strike_call_div_spot
  - oi_weighted_strike_put_div_spot
  - put_call_oi_ratio

# Outcome columns (y-axis / what you're predicting)
y_columns:
  - ret_1d_fwd
  - ret_5d_fwd
  - ret_20d_fwd

# Optional date range (null = no filter)
date_from: null
date_to: null

# Agent settings
model: claude-sonnet-4-6
max_tool_calls: 80


